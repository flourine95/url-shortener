name: url-shortener-v2

services:
  db-v2:
    image: postgres:16-alpine
    container_name: url-shortener-db-v2
    environment:
      POSTGRES_DB: url_shortener_v2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data_v2:/var/lib/postgresql/data
    networks:
      - net-v2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d url_shortener_v2"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-v2:
    image: redis:7-alpine
    container_name: url-shortener-redis-v2
    ports:
      - "6371:6379"
    volumes:
      - redis_data_v2:/data
    networks:
      - net-v2
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app-v2:
    image: url-shortener-app:latest
    pull_policy: missing
    container_name: url-shortener-app-v2
    depends_on:
      db-v2:
        condition: service_healthy
      redis-v2:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: v2
      DB_HOST: db-v2
      DB_PORT: 5432
      DB_NAME: url_shortener_v2
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis-v2
      REDIS_PORT: 6379
      PORT: 8082
    ports:
      - "8082:8082"
    networks:
      - net-v2

networks:
  net-v2:
    driver: bridge

volumes:
  pg_data_v2:
  redis_data_v2:
